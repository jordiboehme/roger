name: Roger
options:
  bundleIdPrefix: com.jordiboehme
  deploymentTarget:
    macOS: "14.4"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.15.2"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.4.0"

targets:
  Roger:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: UI
      - path: Services
      - path: Models
      - path: LLM
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Info.plist
        buildPhase: none
      - path: Resources/Roger.entitlements
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordiboehme.roger
        MARKETING_VERSION: "0.19.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Roger.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 77PA95K95V
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: Roger
    dependencies:
      - package: FluidAudio
        product: FluidAudio
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
